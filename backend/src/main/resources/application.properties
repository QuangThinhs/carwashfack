# ===== Server =====
server.port=8080

# Doc them file .env o thu muc backend (neu co) - giong .env.local cua frontend.
# Dinh dang: KEY=value (KHONG dung 'export', KHONG dung dau nhay). .env da bi .gitignore bo qua.
spring.config.import=optional:file:.env[.properties]

# ===== Database (MySQL) =====
# createDatabaseIfNotExist=true: tu tao database `autowash` neu chua co
spring.datasource.url=jdbc:mysql://localhost:3306/autowash?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&createDatabaseIfNotExist=true&characterEncoding=UTF-8&useUnicode=true&connectionCollation=utf8mb4_general_ci
spring.datasource.username=root
# Mat khau lay tu bien moi truong DB_PASSWORD; mac dinh RONG (dung cho XAMPP/local)
spring.datasource.password=${DB_PASSWORD:}

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Tat open-in-view (best practice; tranh truy van DB luc render view)
spring.jpa.open-in-view=false
# XAMPP la MariaDB, bao version "5.5.5-..." khien Hibernate canh bao thua HHH000511 -> tat canh bao do (app van chay tot)
logging.level.org.hibernate.dialect.Dialect=error

# ===== CORS =====
# Cac origin (frontend) duoc phep goi API - cach nhau bang dau phay.
# Them origin cua VPS/domain khi deploy (vd: http://160.191.54.193:3000)
app.cors.allowed-origins=http://localhost:3000,http://160.191.54.193:3000

# ===== JWT =====
# Secret lay tu bien moi truong JWT_SECRET; gia tri mac dinh ben duoi CHI dung cho dev/local.
# Khi deploy that: dat bien moi truong JWT_SECRET = chuoi ngau nhien dai (>= 256 bit).
app.jwt.secret=${JWT_SECRET:dev-only-secret-doi-khi-deploy-that-toi-thieu-256-bit-aaaaaaaa}
app.jwt.expiration-ms=86400000
