# ===== Server =====
server.port=8080

# ===== Database (MySQL) =====
# createDatabaseIfNotExist=true: tu tao database `autowash` neu chua co
spring.datasource.url=jdbc:mysql://localhost:3306/autowash?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Khai bao dialect MySQL ro rang -> neu MySQL chua bat se bao loi ket noi ro rang hon
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== CORS =====
# Cac origin (frontend) duoc phep goi API - cach nhau bang dau phay.
# Them origin cua VPS/domain khi deploy (vd: http://160.191.54.193:3000)
app.cors.allowed-origins=http://localhost:3000,http://160.191.54.193:3000

# ===== JWT =====
# Doi secret nay bang chuoi ngau nhien dai (>= 256 bit) khi trien khai
app.jwt.secret=change-me-to-a-long-random-secret-at-least-256-bits-long
app.jwt.expiration-ms=86400000
